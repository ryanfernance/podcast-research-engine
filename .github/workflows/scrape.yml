name: Weekly Podcast Scrape

on:
  schedule:
    # Every Sunday at 10:00 UTC (8pm AEST)
    - cron: '0 10 * * 0'
  workflow_dispatch: # Manual trigger button in GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scrape.py

      - name: Move data to public folder
        run: |
          mv data.json public/data.json
          echo "Updated: $(date)" > public/last-updated.txt

      - name: Commit and push
        run: |
          git config user.name "Geronimo Scraper Bot"
          git config user.email "bot@geronimoacademy.com"
          git add public/data.json public/last-updated.txt
          git diff --staged --quiet || git commit -m "Auto-update podcast data $(date +%Y-%m-%d)"
          git push
